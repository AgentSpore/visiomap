<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>visiomap — Location Intelligence</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
    --text: #e4e4e7; --muted: #8b8d98; --accent: #3b82f6;
    --green: #22c55e; --amber: #f59e0b; --red: #ef4444;
    --radius: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

  /* ── Layout ─────────────────────────────────────── */
  .app { display: flex; flex-direction: column; height: 100vh; }
  .toolbar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--card); border-bottom: 1px solid var(--border); z-index: 1000; }
  .toolbar h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.5px; }
  .toolbar h1 span { color: var(--accent); }
  .main { display: flex; flex: 1; overflow: hidden; }
  #map { flex: 1; }
  .sidebar { width: 340px; background: var(--card); border-left: 1px solid var(--border); overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }

  /* ── Controls ────────────────────────────────────── */
  select, button { font-size: 13px; padding: 6px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; }
  button { background: var(--accent); border-color: var(--accent); font-weight: 600; transition: opacity .15s; }
  button:hover { opacity: .85; }
  button.secondary { background: transparent; border-color: var(--border); }
  button.secondary:hover { border-color: var(--accent); }
  select { min-width: 180px; }
  .spacer { flex: 1; }

  /* ── Cards ───────────────────────────────────────── */
  .card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .card h3 { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat { display: flex; flex-direction: column; }
  .stat .label { font-size: 11px; color: var(--muted); }
  .stat .value { font-size: 20px; font-weight: 700; }

  /* ── Density bar ─────────────────────────────────── */
  .density-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin-top: 6px; }
  .density-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }

  /* ── Mood bar ────────────────────────────────────── */
  .mood-bar { display: flex; height: 20px; border-radius: 4px; overflow: hidden; margin-top: 6px; font-size: 11px; font-weight: 600; }
  .mood-bar > div { display: flex; align-items: center; justify-content: center; transition: width .5s ease; }
  .mood-pos { background: var(--green); color: #000; }
  .mood-neu { background: var(--amber); color: #000; }
  .mood-neg { background: var(--red); color: #fff; }

  /* ── Age chart ───────────────────────────────────── */
  .age-bars { display: flex; gap: 6px; align-items: flex-end; height: 60px; margin-top: 8px; }
  .age-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .age-col .bar { width: 100%; border-radius: 3px 3px 0 0; background: var(--accent); transition: height .5s ease; min-height: 2px; }
  .age-col .lbl { font-size: 10px; color: var(--muted); }
  .age-col .pct { font-size: 11px; font-weight: 600; }

  /* ── Tags ─────────────────────────────────────────── */
  .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .tag { background: var(--border); padding: 2px 8px; border-radius: 10px; font-size: 11px; color: var(--muted); }

  /* ── Legend ───────────────────────────────────────── */
  .legend { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--card); border-top: 1px solid var(--border); }
  .legend .gradient { flex: 1; height: 8px; border-radius: 4px; background: linear-gradient(90deg, #3b82f6, #22c55e, #f59e0b, #ef4444); }
  .legend span { font-size: 11px; color: var(--muted); }

  /* ── Responsive ──────────────────────────────────── */
  @media (max-width: 768px) {
    .main { flex-direction: column; }
    .sidebar { width: 100%; max-height: 45vh; border-left: none; border-top: 1px solid var(--border); }
  }
  .loading { text-align: center; color: var(--muted); padding: 40px; }
</style>
</head>
<body>
<div class="app">
  <!-- Toolbar -->
  <div class="toolbar">
    <h1><span>visio</span>map</h1>
    <select id="locationSelect"><option value="">Select location...</option></select>
    <button onclick="loadHeatmap()">Load Heatmap</button>
    <button class="secondary" onclick="loadOverview()">Overview</button>
    <button class="secondary" onclick="analyzeAll()">Analyze All</button>
    <div class="spacer"></div>
    <span style="font-size:12px;color:var(--muted)">Location Intelligence</span>
  </div>

  <!-- Main -->
  <div class="main">
    <div id="map"></div>
    <div class="sidebar" id="sidebar">
      <div class="loading">Select a location to view analytics</div>
    </div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <span>Low</span>
    <div class="gradient"></div>
    <span>High</span>
    <span style="margin-left:8px">Crowd Density</span>
  </div>
</div>

<script>
const API = '';
const map = L.map('map', { zoomControl: false }).setView([40.758, -73.985], 13);

L.control.zoom({ position: 'bottomleft' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
  maxZoom: 19
}).addTo(map);

let heatLayer = null;
let markers = [];

// ── Load locations ───────────────────────────────────
async function loadLocations() {
  const resp = await fetch(`${API}/locations`);
  const locs = await resp.json();
  const sel = document.getElementById('locationSelect');
  sel.innerHTML = '<option value="">Select location...</option>';
  locs.forEach(l => {
    const opt = document.createElement('option');
    opt.value = l.id;
    opt.textContent = `${l.name} (${l.media_count} media)`;
    sel.appendChild(opt);
  });
  return locs;
}

// ── Load heatmap ─────────────────────────────────────
async function loadHeatmap() {
  const locId = document.getElementById('locationSelect').value;
  if (!locId) return alert('Select a location first');

  const [heatResp, analyticsResp] = await Promise.all([
    fetch(`${API}/locations/${locId}/heatmap`),
    fetch(`${API}/locations/${locId}/analytics`)
  ]);
  const heat = await heatResp.json();
  const analytics = await analyticsResp.json();

  // Center map
  map.setView([heat.center_lat, heat.center_lng], 15);

  // Clear old
  if (heatLayer) map.removeLayer(heatLayer);
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  // Add heat points
  if (heat.points.length > 0) {
    const pts = heat.points.map(p => [p.lat, p.lng, p.intensity]);
    heatLayer = L.heatLayer(pts, {
      radius: 30, blur: 20, maxZoom: 17, max: 1.0,
      gradient: { 0.2: '#3b82f6', 0.4: '#22c55e', 0.6: '#f59e0b', 0.8: '#ef4444', 1.0: '#dc2626' }
    }).addTo(map);
  }

  // Add center marker
  const m = L.circleMarker([heat.center_lat, heat.center_lng], {
    radius: 10, fillColor: '#3b82f6', color: '#fff', weight: 2, fillOpacity: 0.8
  }).addTo(map).bindPopup(`<b>${heat.location_name}</b><br>Samples: ${heat.total_samples}`);
  markers.push(m);

  renderAnalytics(analytics);
}

// ── Overview ─────────────────────────────────────────
async function loadOverview() {
  const resp = await fetch(`${API}/analytics/overview`);
  const data = await resp.json();

  // Clear old markers
  if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  // Load all locations for markers
  const locsResp = await fetch(`${API}/locations`);
  const locs = await locsResp.json();

  locs.forEach(l => {
    const density = l.avg_crowd_density || 0;
    const color = density > 7 ? '#ef4444' : density > 4 ? '#f59e0b' : '#22c55e';
    const r = Math.max(8, Math.min(20, density * 2.5));
    const m = L.circleMarker([l.lat, l.lng], {
      radius: r, fillColor: color, color: '#fff', weight: 2, fillOpacity: 0.7
    }).addTo(map).bindPopup(`<b>${l.name}</b><br>Density: ${density}/10<br>Media: ${l.media_count}`);
    markers.push(m);
  });

  if (locs.length > 0) {
    const bounds = L.latLngBounds(locs.map(l => [l.lat, l.lng]));
    map.fitBounds(bounds, { padding: [50, 50] });
  }

  renderOverview(data);
}

// ── Analyze all ──────────────────────────────────────
async function analyzeAll() {
  const locId = document.getElementById('locationSelect').value;
  const url = locId ? `${API}/media/analyze/all?location_id=${locId}` : `${API}/media/analyze/all`;
  const resp = await fetch(url, { method: 'POST' });
  const data = await resp.json();
  alert(`Analyzed: ${data.analyzed}, Failed: ${data.failed}`);
  if (locId) loadHeatmap();
}

// ── Render analytics sidebar ─────────────────────────
function renderAnalytics(a) {
  const density = a.avg_crowd_density || 0;
  const pct = Math.round(density * 10);
  const color = density > 7 ? 'var(--red)' : density > 4 ? 'var(--amber)' : 'var(--green)';

  let html = `
    <div class="card">
      <h3>Analytics — ${a.location_name}</h3>
      <div class="stat-grid">
        <div class="stat"><span class="label">Media</span><span class="value">${a.analyzed_media}/${a.total_media}</span></div>
        <div class="stat"><span class="label">Avg Density</span><span class="value" style="color:${color}">${density}/10</span></div>
        <div class="stat"><span class="label">Peak</span><span class="value">${a.peak_crowd_density || '—'}</span></div>
        <div class="stat"><span class="label">Mood</span><span class="value">${a.dominant_mood || '—'}</span></div>
      </div>
      <div class="density-bar"><div class="density-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;

  // Mood distribution
  if (a.mood_distribution) {
    const m = a.mood_distribution;
    html += `
    <div class="card">
      <h3>Mood Distribution</h3>
      <div class="mood-bar">
        <div class="mood-pos" style="width:${m.positive||0}%">${Math.round(m.positive||0)}%</div>
        <div class="mood-neu" style="width:${m.neutral||0}%">${Math.round(m.neutral||0)}%</div>
        <div class="mood-neg" style="width:${m.negative||0}%">${Math.round(m.negative||0)}%</div>
      </div>
    </div>`;
  }

  // Age distribution
  if (a.age_distribution) {
    const ag = a.age_distribution;
    const maxAge = Math.max(...Object.values(ag), 1);
    const labels = { child: 'Child', young_adult: 'Young', adult: 'Adult', senior: 'Senior' };
    let bars = '';
    for (const [k, v] of Object.entries(ag)) {
      const h = Math.round((v / maxAge) * 50);
      bars += `<div class="age-col"><div class="pct">${Math.round(v)}%</div><div class="bar" style="height:${h}px"></div><div class="lbl">${labels[k]||k}</div></div>`;
    }
    html += `<div class="card"><h3>Age Distribution</h3><div class="age-bars">${bars}</div></div>`;
  }

  // Environment tags
  if (a.top_environment_tags && a.top_environment_tags.length) {
    const tags = a.top_environment_tags.map(t => `<span class="tag">${t}</span>`).join('');
    html += `<div class="card"><h3>Environment</h3><div class="tags">${tags}</div></div>`;
  }

  // Daily trend
  if (a.daily_trend && a.daily_trend.length) {
    const maxD = Math.max(...a.daily_trend.map(d => d.avg_density), 1);
    let trendBars = '';
    for (const d of a.daily_trend.slice(0, 7).reverse()) {
      const h = Math.round((d.avg_density / maxD) * 40);
      const c = d.avg_density > 7 ? 'var(--red)' : d.avg_density > 4 ? 'var(--amber)' : 'var(--green)';
      trendBars += `<div class="age-col"><div class="pct">${d.avg_density}</div><div class="bar" style="height:${h}px;background:${c}"></div><div class="lbl">${d.date.slice(5)}</div></div>`;
    }
    html += `<div class="card"><h3>Daily Trend (last 7d)</h3><div class="age-bars">${trendBars}</div></div>`;
  }

  document.getElementById('sidebar').innerHTML = html;
}

// ── Render overview sidebar ──────────────────────────
function renderOverview(o) {
  let html = `
    <div class="card">
      <h3>Overview</h3>
      <div class="stat-grid">
        <div class="stat"><span class="label">Locations</span><span class="value">${o.total_locations}</span></div>
        <div class="stat"><span class="label">Total Media</span><span class="value">${o.total_media}</span></div>
        <div class="stat"><span class="label">Analyzed</span><span class="value">${o.analyzed_media}</span></div>
        <div class="stat"><span class="label">Avg Density</span><span class="value">${o.avg_crowd_density || '—'}</span></div>
      </div>
    </div>`;

  if (o.busiest_location) {
    html += `<div class="card"><h3>Busiest Location</h3><div class="stat"><span class="value" style="font-size:16px;color:var(--amber)">${o.busiest_location}</span></div></div>`;
  }

  if (o.locations_summary && o.locations_summary.length) {
    let rows = o.locations_summary.map(l => {
      const d = l.avg_crowd_density || 0;
      const c = d > 7 ? 'var(--red)' : d > 4 ? 'var(--amber)' : 'var(--green)';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:13px">${l.name}</span>
        <span style="font-size:13px;font-weight:700;color:${c}">${d}/10</span>
      </div>`;
    }).join('');
    html += `<div class="card"><h3>All Locations</h3>${rows}</div>`;
  }

  document.getElementById('sidebar').innerHTML = html;
}

// ── Init ─────────────────────────────────────────────
loadLocations();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>visiomap — Location Intelligence</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f13; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }

    header {
      padding: 12px 20px;
      background: #16161e;
      border-bottom: 1px solid #2d2d3d;
      display: flex; align-items: center; gap: 16px;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; color: #7c86ff; letter-spacing: 0.03em; }
    header span { font-size: 0.75rem; color: #64748b; }

    .toolbar {
      padding: 10px 16px;
      background: #12121a;
      border-bottom: 1px solid #2d2d3d;
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    }
    select, button {
      padding: 6px 12px; border-radius: 6px; font-size: 0.82rem;
      border: 1px solid #2d2d3d; outline: none; cursor: pointer;
    }
    select { background: #1e1e2e; color: #e2e8f0; min-width: 180px; }
    button { background: #7c86ff; color: #fff; border-color: #7c86ff; font-weight: 600; }
    button:hover { background: #6470ff; }
    button.secondary { background: #1e1e2e; color: #94a3b8; border-color: #2d2d3d; }
    button.secondary:hover { background: #2d2d3d; }

    .main { display: flex; flex: 1; overflow: hidden; }
    #map { flex: 1; }

    .sidebar {
      width: 280px; background: #12121a; border-left: 1px solid #2d2d3d;
      overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px;
    }

    .card { background: #1e1e2e; border-radius: 8px; padding: 14px; border: 1px solid #2d2d3d; }
    .card h3 { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; margin-bottom: 10px; }

    .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .stat-label { font-size: 0.78rem; color: #94a3b8; }
    .stat-value { font-size: 0.92rem; font-weight: 700; color: #e2e8f0; }

    .density-bar { height: 6px; border-radius: 3px; background: #2d2d3d; margin: 4px 0 10px; overflow: hidden; }
    .density-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }

    .tag-list { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag { padding: 2px 8px; background: #2d2d3d; border-radius: 12px; font-size: 0.7rem; color: #94a3b8; }

    .mood-bar { display: flex; height: 8px; border-radius: 4px; overflow: hidden; margin: 6px 0; }
    .mood-pos { background: #22c55e; }
    .mood-neu { background: #f59e0b; }
    .mood-neg { background: #ef4444; }

    .age-row { display: flex; gap: 4px; margin: 6px 0; }
    .age-seg { flex: 1; text-align: center; font-size: 0.65rem; color: #64748b; }
    .age-bar { height: 32px; border-radius: 3px; background: #7c86ff; margin-bottom: 2px; min-height: 4px; }

    .status { font-size: 0.75rem; color: #64748b; text-align: center; padding: 8px; }
    .status.error { color: #ef4444; }

    .legend {
      position: absolute; bottom: 24px; left: 16px; z-index: 1000;
      background: #12121aee; border: 1px solid #2d2d3d; border-radius: 8px;
      padding: 10px 14px; font-size: 0.72rem; color: #94a3b8;
    }
    .legend-gradient {
      width: 120px; height: 8px; border-radius: 4px;
      background: linear-gradient(to right, #3b82f6, #22c55e, #f59e0b, #ef4444);
      margin: 6px 0 4px;
    }
    .legend-labels { display: flex; justify-content: space-between; }
  </style>
</head>
<body>

<header>
  <h1>visiomap</h1>
  <span>Location Intelligence from Visual Media</span>
</header>

<div class="toolbar">
  <select id="locSelect"><option value="">— Select location —</option></select>
  <button onclick="loadHeatmap()">Load Heatmap</button>
  <button class="secondary" onclick="loadOverview()">Overview</button>
  <button class="secondary" onclick="analyzeAll()">Analyze All</button>
  <span id="statusBar" style="font-size:0.78rem;color:#64748b;margin-left:8px;"></span>
</div>

<div class="main">
  <div id="map"></div>
  <div class="sidebar" id="sidebar">
    <div class="card">
      <h3>Overview</h3>
      <div id="overviewContent"><div class="status">Select a location or load overview</div></div>
    </div>
    <div class="card" id="analyticsCard" style="display:none">
      <h3>Analytics</h3>
      <div id="analyticsContent"></div>
    </div>
  </div>
</div>

<div class="legend">
  Crowd Density
  <div class="legend-gradient"></div>
  <div class="legend-labels"><span>Low</span><span>High</span></div>
</div>

<script>
const API = '';  // same origin

const map = L.map('map').setView([55.75, 37.61], 11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  maxZoom: 19,
}).addTo(map);

let heatLayer = null;
let circleLayer = null;

function setStatus(msg, error = false) {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.style.color = error ? '#ef4444' : '#64748b';
}

async function fetchJSON(url) {
  const r = await fetch(API + url);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

async function loadLocations() {
  try {
    const locs = await fetchJSON('/locations');
    const sel = document.getElementById('locSelect');
    sel.innerHTML = '<option value="">— Select location —</option>';
    locs.forEach(l => {
      const opt = document.createElement('option');
      opt.value = l.id;
      opt.dataset.lat = l.lat;
      opt.dataset.lng = l.lng;
      opt.textContent = `${l.name} (${l.media_count} media)`;
      sel.appendChild(opt);
    });
  } catch (e) {
    setStatus('Failed to load locations', true);
  }
}

async function loadOverview() {
  setStatus('Loading overview…');
  try {
    const data = await fetchJSON('/analytics/overview');
    const el = document.getElementById('overviewContent');
    el.innerHTML = `
      <div class="stat-row"><span class="stat-label">Locations</span><span class="stat-value">${data.total_locations}</span></div>
      <div class="stat-row"><span class="stat-label">Total media</span><span class="stat-value">${data.total_media}</span></div>
      <div class="stat-row"><span class="stat-label">Analyzed</span><span class="stat-value">${data.analyzed_media}</span></div>
      ${data.avg_crowd_density != null ? `
        <div class="stat-row"><span class="stat-label">Avg density</span><span class="stat-value">${data.avg_crowd_density}/10</span></div>
        <div class="density-bar"><div class="density-fill" style="width:${data.avg_crowd_density*10}%;background:#7c86ff"></div></div>
      ` : ''}
      ${data.busiest_location ? `<div class="stat-row"><span class="stat-label">Busiest</span><span class="stat-value" style="font-size:0.78rem">${data.busiest_location}</span></div>` : ''}
    `;

    // Drop markers
    if (circleLayer) map.removeLayer(circleLayer);
    const group = L.layerGroup().addTo(map);
    circleLayer = group;
    data.locations.forEach(l => {
      if (!l.avg_crowd_density) return;
      const intensity = l.avg_crowd_density / 10;
      const color = intensity > 0.7 ? '#ef4444' : intensity > 0.4 ? '#f59e0b' : '#22c55e';
      L.circleMarker([l.lat, l.lng], {
        radius: 8 + intensity * 10,
        color, fillColor: color, fillOpacity: 0.7, weight: 2,
      }).bindPopup(`<b>${l.name}</b><br>Density: ${l.avg_crowd_density}/10<br>Media: ${l.media_count}`).addTo(group);
    });

    if (data.locations.length > 0) {
      const bounds = L.latLngBounds(data.locations.map(l => [l.lat, l.lng]));
      map.fitBounds(bounds.pad(0.2));
    }
    setStatus('Overview loaded');
  } catch (e) {
    setStatus('Failed to load overview', true);
  }
}

async function loadHeatmap() {
  const sel = document.getElementById('locSelect');
  const id = sel.value;
  if (!id) { setStatus('Select a location first', true); return; }

  setStatus('Loading heatmap…');
  try {
    const [heat, analytics] = await Promise.all([
      fetchJSON(`/locations/${id}/heatmap`),
      fetchJSON(`/locations/${id}/analytics`),
    ]);

    if (heatLayer) map.removeLayer(heatLayer);
    if (circleLayer) map.removeLayer(circleLayer);

    if (heat.points.length === 0) {
      setStatus('No analyzed media for this location');
    } else {
      const points = heat.points.map(p => [p.lat, p.lng, p.intensity]);
      heatLayer = L.heatLayer(points, {
        radius: 35, blur: 25, maxZoom: 17,
        gradient: { 0.2: '#3b82f6', 0.5: '#22c55e', 0.75: '#f59e0b', 1.0: '#ef4444' },
      }).addTo(map);
      map.setView([heat.center_lat, heat.center_lng], 14);
      setStatus(`${heat.total_samples} samples · max density ${heat.max_density}/10`);
    }

    // Render analytics sidebar
    renderAnalytics(analytics);
  } catch (e) {
    setStatus('Failed to load heatmap: ' + e.message, true);
  }
}

function renderAnalytics(a) {
  const card = document.getElementById('analyticsCard');
  const el = document.getElementById('analyticsContent');
  card.style.display = 'block';

  const moodPos = a.mood_distribution?.positive || 0;
  const moodNeu = a.mood_distribution?.neutral || 0;
  const moodNeg = a.mood_distribution?.negative || 0;

  el.innerHTML = `
    <div class="stat-row"><span class="stat-label">Media</span><span class="stat-value">${a.analyzed_media}/${a.total_media}</span></div>
    ${a.avg_crowd_density != null ? `
      <div class="stat-row"><span class="stat-label">Avg density</span><span class="stat-value">${a.avg_crowd_density}/10</span></div>
      <div class="density-bar"><div class="density-fill" style="width:${a.avg_crowd_density*10}%;background:#7c86ff"></div></div>
    ` : ''}
    ${a.dominant_mood ? `<div class="stat-row"><span class="stat-label">Mood</span><span class="stat-value">${a.dominant_mood}</span></div>` : ''}
    ${a.mood_distribution ? `
      <div class="mood-bar">
        <div class="mood-pos" style="flex:${moodPos}"></div>
        <div class="mood-neu" style="flex:${moodNeu}"></div>
        <div class="mood-neg" style="flex:${moodNeg}"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:0.68rem;color:#64748b">
        <span>😊 ${moodPos}%</span><span>😐 ${moodNeu}%</span><span>😟 ${moodNeg}%</span>
      </div>
    ` : ''}
    ${a.age_distribution ? `
      <div style="margin-top:10px;font-size:0.72rem;color:#64748b;margin-bottom:4px">Age distribution</div>
      <div class="age-row">
        ${Object.entries(a.age_distribution).map(([k, v]) => `
          <div class="age-seg">
            <div class="age-bar" style="height:${Math.max(4, v * 0.4)}px;opacity:${0.5 + v/200}"></div>
            <div>${Math.round(v)}%</div>
            <div style="font-size:0.6rem">${k.replace('_',' ')}</div>
          </div>
        `).join('')}
      </div>
    ` : ''}
    ${a.top_environment_tags.length ? `
      <div style="margin-top:8px">
        <div class="tag-list">${a.top_environment_tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
    ` : ''}
  `;
}

async function analyzeAll() {
  const sel = document.getElementById('locSelect');
  const id = sel.value || null;
  const url = id ? `/media/analyze/all?location_id=${id}` : '/media/analyze/all';
  setStatus('Triggering analysis…');
  try {
    const r = await fetch(API + url, { method: 'POST' });
    const data = await r.json();
    setStatus(`Analyzed ${data.processed} items (${data.failed} failed)`);
    if (id) await loadHeatmap();
  } catch (e) {
    setStatus('Analysis failed', true);
  }
}

// Init
loadLocations();
loadOverview();
</script>
</body>
</html>
